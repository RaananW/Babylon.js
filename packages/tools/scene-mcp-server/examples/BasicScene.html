<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BasicScene</title>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; padding: 0; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        /**
         * BasicScene
         * A simple scene with a camera, light, and textured box
         *
         * Generated by Babylon.js Scene MCP Server
         * Version: 1.0.0
         */

        // ─── Imports ──────────────────────────────────────────────────────────────
        // If using ES modules / npm:
        // import * from "@babylonjs/core";
        // import "@babylonjs/loaders"; // For glTF/OBJ model loading

        async function createScene() {
            const canvas = document.getElementById("renderCanvas");
            const engine = new BABYLON.Engine(canvas, true, { stencil: true });

            const scene = new BABYLON.Scene(engine);

            // ─── Environment ──────────────────────────────────────────────────────────
            scene.clearColor = new BABYLON.Color4(0.2, 0.2, 0.3, 1);
            scene.ambientColor = new BABYLON.Color3(0, 0, 0);
            scene.gravity = new BABYLON.Vector3(0, -9.81, 0);

            // ─── Cameras ──────────────────────────────────────────────────────────────
            const mainCam = new BABYLON.ArcRotateCamera("mainCam", 1.5, 1.2, 10, BABYLON.Vector3.Zero(), scene);
            mainCam.uniqueId = 1;
            mainCam.attachControl(canvas, true);

            scene.activeCamera = mainCam;

            // ─── Lights ───────────────────────────────────────────────────────────────
            const sun = new BABYLON.HemisphericLight("sun", new BABYLON.Vector3(0, 1, 0), scene);
            sun.uniqueId = 1;
            sun.intensity = 0.8;

            // ─── Materials ────────────────────────────────────────────────────────────
            const boxMat = new BABYLON.PBRMaterial("boxMat", scene);
            boxMat.uniqueId = 1;
            boxMat.albedoColor = new BABYLON.Color3(0.8, 0.2, 0.2);

            // ─── Meshes ───────────────────────────────────────────────────────────────
            const box1 = BABYLON.MeshBuilder.CreateBox("box1", { size: 2 }, scene);
            box1.uniqueId = 1;
            box1.receiveShadows = true;

            const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 10, height: 10 }, scene);
            ground.uniqueId = 2;
            ground.receiveShadows = true;

            // ─── Material Assignments ─────────────────────────────────────────────────
            box1.material = boxMat;

            // ─── Render Loop ──────────────────────────────────────────────────────────
            engine.runRenderLoop(() => {
                scene.render();
            });

            window.addEventListener("resize", () => {
                engine.resize();
            });
        }

        createScene().catch(function(e) { console.error("Scene init error:", e); });
    </script>
</body>
</html>
