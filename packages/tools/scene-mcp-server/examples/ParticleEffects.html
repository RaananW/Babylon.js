<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ParticleEffects</title>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; padding: 0; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        /**
         * ParticleEffects
         * A scene with particle systems and gradients
         *
         * Generated by Babylon.js Scene MCP Server
         * Version: 1.0.0
         */

        // ─── Imports ──────────────────────────────────────────────────────────────
        // If using ES modules / npm:
        // import * from "@babylonjs/core";
        // import "@babylonjs/loaders"; // For glTF/OBJ model loading

        async function createScene() {
            const canvas = document.getElementById("renderCanvas");
            const engine = new BABYLON.Engine(canvas, true, { stencil: true });

            const scene = new BABYLON.Scene(engine);

            // ─── Environment ──────────────────────────────────────────────────────────
            scene.clearColor = new BABYLON.Color4(0.2, 0.2, 0.3, 1);
            scene.ambientColor = new BABYLON.Color3(0, 0, 0);
            scene.gravity = new BABYLON.Vector3(0, -9.81, 0);

            // ─── Cameras ──────────────────────────────────────────────────────────────
            const cam = new BABYLON.ArcRotateCamera("cam", -1.5707963267948966, 1.5707963267948966, 10, BABYLON.Vector3.Zero(), scene);
            cam.uniqueId = 1;
            cam.attachControl(canvas, true);

            scene.activeCamera = cam;

            // ─── Lights ───────────────────────────────────────────────────────────────
            const light = new BABYLON.PointLight("light", new BABYLON.Vector3(0, 5, 0), scene);
            light.uniqueId = 1;

            // ─── Meshes ───────────────────────────────────────────────────────────────
            const emitter = BABYLON.MeshBuilder.CreateSphere("emitter", { diameter: 0.5 }, scene);
            emitter.uniqueId = 1;
            emitter.position = new BABYLON.Vector3(0, 1, 0);
            emitter.receiveShadows = true;

            const smokeEmitter = BABYLON.MeshBuilder.CreateBox("smokeEmitter", { size: 0.3 }, scene);
            smokeEmitter.uniqueId = 2;
            smokeEmitter.position = new BABYLON.Vector3(3, 0, 0);
            smokeEmitter.receiveShadows = true;

            // ─── Particle Systems ─────────────────────────────────────────────────────
            // Particle System: fire
            const fire = new BABYLON.ParticleSystem("fire", 2000, scene);
            fire.emitter = mesh_1; // mesh reference
            const fireEmitterType = new BABYLON.ConeParticleEmitter();
            fire.particleEmitterType = fireEmitterType;
            fire.emitRate = 100;
            fire.minLifeTime = 0.3;
            fire.maxLifeTime = 1.5;
            fire.minSize = 0.1;
            fire.maxSize = 0.5;
            fire.blendMode = 1;
            fire.addColorGradient(0, new BABYLON.Color4(1, 0.8, 0, 1));
            fire.addColorGradient(0.5, new BABYLON.Color4(1, 0.3, 0, 0.8));
            fire.addColorGradient(1, new BABYLON.Color4(0.2, 0, 0, 0));
            fire.addSizeGradient(0, 0.1);
            fire.addSizeGradient(1, 0.5);
            fire.start();

            // Particle System: smoke
            const smoke = new BABYLON.ParticleSystem("smoke", 500, scene);
            smoke.emitter = mesh_2; // mesh reference
            const smokeEmitterType = new BABYLON.BoxParticleEmitter();
            smoke.particleEmitterType = smokeEmitterType;
            smoke.emitRate = 30;
            smoke.minLifeTime = 1;
            smoke.maxLifeTime = 3;
            smoke.minSize = 0.3;
            smoke.maxSize = 1;
            smoke.start();

            // ─── Render Loop ──────────────────────────────────────────────────────────
            engine.runRenderLoop(() => {
                scene.render();
            });

            window.addEventListener("resize", () => {
                engine.resize();
            });
        }

        createScene().catch(function(e) { console.error("Scene init error:", e); });
    </script>
</body>
</html>
